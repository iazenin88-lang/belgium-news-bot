# -------------------------------------------------------
# Workflow: Notify editor
#
# Назначение:
# отправляет кандидатов на публикацию из editor_queue
# в Telegram редактору канала
# -------------------------------------------------------

name: Notify editor

# -------------------------------------------------------
# Триггеры запуска
# -------------------------------------------------------
on:

  # Позволяет запускать workflow вручную из интерфейса GitHub
  workflow_dispatch:

  # Автоматический запуск по расписанию
  schedule:

    # каждые 30 минут с 07:15 до 22:45
    #
    # смещение на 5 минут после analyzer,
    # чтобы анализ успел добавить статьи в очередь
    - cron: "15,45 7-22 * * *"

# -------------------------------------------------------
# Определение задач workflow
# -------------------------------------------------------
jobs:

  run:

    # GitHub запускает задачу на виртуальной машине Ubuntu
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------------
      # Шаг 1
      # Клонирование репозитория
      # ---------------------------------------------------
      - uses: actions/checkout@v4


      # ---------------------------------------------------
      # Шаг 2
      # Установка Python
      # ---------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:

          # используем Python 3.11
          python-version: "3.11"


      # ---------------------------------------------------
      # Шаг 3
      # Установка библиотек Python
      # ---------------------------------------------------
      - name: Install libraries
        run: |
          pip install supabase requests


      # ---------------------------------------------------
      # Шаг 4
      # Запуск notifier.py
      # ---------------------------------------------------
      - name: Run notifier

        # передаём секреты в переменные окружения
        env:

          # параметры Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

          # параметры Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        # запуск скрипта
        run: |
          python notifier.py
